<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lógica Láctea</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>

<!-- Estilos globales -->
<link rel="stylesheet" href="./styles/global.css">

<style>
body { font-family: 'Work Sans', sans-serif; }
.hidden { display: none; }

/* Loader */
#loader {
  position: fixed;
  inset: 0;
  background: #faf5ff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
  transition: opacity 0.5s ease;
}

/* Animaciones */
#mouth { animation: chew 0.8s infinite; }
@keyframes chew {
  0%,100% { transform: scaleY(1); }
  50% { transform: scaleY(0.3); }
}

svg { animation: float 2s ease-in-out infinite; }
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
</style>
</head>

<body class="bg-[#faf5ff] text-slate-900">

<!-- 🐄 LOADER -->
<div id="loader">
  <svg width="120" height="120" viewBox="0 0 200 200">
    <circle cx="100" cy="100" r="70" fill="#fff" stroke="#000"/>
    <rect id="mouth" x="80" y="130" width="40" height="10" fill="#000"/>
  </svg>
  <p class="mt-4 font-bold text-purple-700">Cargando...</p>
</div>

<!-- APP -->
<div id="app" class="hidden p-5 min-h-screen flex flex-col">

<header class="mb-6">
  <h1 class="text-2xl font-black">Lógica Láctea</h1>
  <p id="saludo" class="text-purple-600 text-sm"></p>
</header>

<main class="grid grid-cols-2 gap-4 flex-grow">

<button onclick="go('pages/pedidos.html')" class="bg-purple-700 text-white p-6 rounded-3xl col-span-2">
  📦 Pedidos
  <div id="badge-pedidos"></div>
</button>

<button onclick="go('pages/inventario.html')" class="bg-white p-5 rounded-3xl">
  📊 Inventario
  <div id="badge-stock"></div>
</button>

<button onclick="go('pages/proveedores.html')" class="bg-white p-5 rounded-3xl">
  🚚 Prov.
</button>

<button onclick="go('pages/clientes.html')" class="bg-white p-5 rounded-3xl">
  👥 Clientes
</button>

<button onclick="go('pages/finanzas.html')" class="bg-white p-5 rounded-3xl">
  💰 Finanzas
  <div id="badge-finanzas"></div>
</button>

<button onclick="go('pages/ajustes.html')" class="bg-white p-5 rounded-3xl">
  ⚙️ Ajustes
</button>

<button onclick="verRuta()" class="bg-black text-white p-6 rounded-3xl col-span-2">
  🚛 Ruta de Hoy
  <div id="badge-ruta"></div>
</button>

</main>

<footer class="text-center text-xs mt-6">
Kilómetro Cero • v1.0.0
</footer>

</div>

<!-- JS -->
<script type="module">

import { getDashboardData } from "./services/dashboardService.js";
import { go } from "./js/router.js";

window.go = go;

// =========================
// INIT
// =========================
async function init() {

  try {

    const data = await getDashboardData();

    setBadge("badge-pedidos", data.pedidos);
    setBadge("badge-finanzas", data.total > 0 ? `$${data.total}` : "");
    setBadge("badge-stock", data.critico > 0 ? "!" : "");

    saludo();

    // ocultar loader
    setTimeout(() => {
      document.getElementById("loader").style.opacity = 0;

      setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("app").classList.remove("hidden");
      }, 400);

    }, 1000);

  } catch (e) {
    console.error(e);
  }
}

// =========================
// BADGES
// =========================
function setBadge(id, val) {
  const el = document.getElementById(id);
  if (!el) return;

  if (val && val !== 0) {
    el.innerText = val;
    el.style.display = "block";
  } else {
    el.style.display = "none";
  }
}

// =========================
// SALUDO
// =========================
function saludo() {
  const hr = new Date().getHours();
  const s = document.getElementById("saludo");

  if (hr < 12) s.innerText = "Buenos días";
  else if (hr < 18) s.innerText = "Buenas tardes";
  else s.innerText = "Buenas noches";
}

// =========================
// RUTA SIMPLE
// =========================
async function verRuta() {

  const res = await fetch(`https://script.google.com/macros/s/AKfycbwglNauq2RBBZqcPkamIBqioTShRzO_Jo9Afjo7r0OWC7AKy6740QEeOywZ26Pssm6u/exec?pestaña=Pedidos`);
  const data = await res.json();

  const pendientes = data.filter(p => p.Estado === "PENDIENTE");

  let zonas = {};

  pendientes.forEach(p => {
    if (!zonas[p.Zona]) zonas[p.Zona] = [];
    zonas[p.Zona].push(p);
  });

  let texto = "RUTA:\n\n";

  Object.keys(zonas).forEach(z => {
    texto += `Zona ${z}\n`;
    zonas[z].forEach(p => {
      texto += `- ${p.Cliente} (${p.Dirección})\n`;
    });
    texto += "\n";
  });

  alert(texto);
}

init();

</script>

</body>
</html>
