<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lógica Láctea - Gestión</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { font-family: 'Work Sans', sans-serif; }

/* 🐄 LOADER */
#loader {
    position: fixed;
    inset: 0;
    background: #faf5ff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
    transition: opacity 0.5s ease;
}

.cow {
    font-size: 60px;
    animation: bounce 1.5s infinite;
}

.mouth {
    display: inline-block;
    animation: chew 0.8s infinite;
}

@keyframes chew {
    0%,100% { transform: scaleY(1); }
    50% { transform: scaleY(0.3); }
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
</style>
</head>

<body class="bg-purple-50">

<!-- 🐄 LOADER -->
<div id="loader">
    <div class="cow">🐄</div>
    <p class="text-purple-700 font-bold mt-3">Cargando sistema...</p>
</div>

<!-- APP -->
<div id="app" class="hidden px-5 py-8">

<header class="mb-8 flex justify-between items-center">
    <div>
        <h1 class="text-2xl font-black uppercase">Lógica Láctea</h1>
        <p id="saludo" class="text-purple-600 text-xs">...</p>
    </div>
</header>

<main id="main-panel" class="grid grid-cols-2 gap-4">

<button onclick="window.location.href='pedidos.html'" class="bg-purple-600 text-white p-6 rounded-3xl col-span-2">
📦 Pedidos
</button>

<button onclick="window.location.href='inventario.html'" class="bg-white p-4 rounded-3xl shadow">
📊 Inventario
</button>

<button onclick="window.location.href='proveedores.html'" class="bg-white p-4 rounded-3xl shadow">
🚚 Prov.
</button>

<button onclick="window.location.href='clientes.html'" class="bg-white p-4 rounded-3xl shadow">
👥 Clientes
</button>

<button onclick="window.location.href='finanzas.html'" class="bg-white p-4 rounded-3xl shadow">
💰 Finanzas
</button>

<button onclick="window.location.href='ajustes.html'" class="bg-white p-4 rounded-3xl shadow">
⚙️ Ajustes
</button>

<button onclick="rutaHoy()" class="bg-black text-white p-6 rounded-3xl col-span-2">
🚛 Ruta de Hoy
</button>

</main>

<footer class="text-center mt-6 text-xs text-gray-400">
Kilómetro Cero • v1.0
</footer>

</div>

<script type="module">
import { getDashboardData } from "./services/dairyService.js";

async function init() {
    try {
        await getDashboardData();

        setTimeout(() => {
            document.getElementById("loader").style.opacity = 0;
            setTimeout(() => {
                document.getElementById("loader").style.display = "none";
                document.getElementById("app").classList.remove("hidden");
            }, 500);
        }, 1200);

        saludo();

    } catch (e) {
        console.error(e);
    }
}

function saludo() {
    const hr = new Date().getHours();
    const s = document.getElementById('saludo');

    if (hr < 12) s.innerText = "Buenos días";
    else if (hr < 18) s.innerText = "Buenas tardes";
    else s.innerText = "Buenas noches";
}

init();
</script>

</body>
</html>
