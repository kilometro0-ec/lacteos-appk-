<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>
</head>
<body>

<h1>📦 Pedidos</h1>

<button onclick="crearPedido()">+ Nuevo Pedido</button>

<div id="lista"></div>

<script src="main.js"></script>

<script>
async function cargarPedidos() {
  const res = await fetch(`${API}?pestaña=Pedidos`);
  const data = await res.json();

  let html = "";

  data.forEach(p => {
    html += `
      <div style="border:1px solid #ccc;padding:10px;margin:5px;">
        <b>${p.Cliente}</b><br>
        ${p.Dirección}<br>
        Estado: ${p.Estado}<br>
        <button onclick="entregarPedido(${p.ID})">Entregar</button>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

cargarPedidos();
</script>

</body>
</html>
