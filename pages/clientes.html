<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clientes - Lógica Láctea</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                primary: "#a21caf",
                background: "#faf5ff",
                outline: "#e9d5ff"
            }
        }
    }
}
</script>

<style>
body { font-family: 'Work Sans', sans-serif; }

/* CARD */
.card {
    border-radius: 1.5rem;
}

/* INPUT */
.input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e9d5ff;
    outline: none;
}
</style>

</head>

<body class="bg-background text-slate-900 min-h-screen flex flex-col px-5 py-6">

<!-- HEADER -->
<header class="mb-6 flex items-center justify-between">
    
    <button onclick="history.back()"
        class="w-10 h-10 bg-white border border-outline rounded-xl flex items-center justify-center">
        <span class="material-symbols-outlined">arrow_back</span>
    </button>

    <h1 class="text-lg font-black uppercase">Clientes</h1>

    <button onclick="toggleForm()"
        class="w-10 h-10 bg-primary text-white rounded-xl flex items-center justify-center">
        <span class="material-symbols-outlined">add</span>
    </button>
</header>

<!-- BUSCADOR -->
<div class="mb-4">
    <input id="buscar" oninput="filtrarClientes()"
        class="input"
        placeholder="Buscar cliente...">
</div>

<!-- FORMULARIO -->
<div id="formCliente" class="hidden bg-white p-5 card border border-outline mb-4">

    <h2 class="font-bold mb-3">Nuevo Cliente</h2>

    <input id="nombre" class="input mb-2" placeholder="Nombre">
    <input id="telefono" class="input mb-2" placeholder="Teléfono">
    <input id="direccion" class="input mb-2" placeholder="Dirección">
    <input id="zona" class="input mb-3" placeholder="Zona">

    <button onclick="guardarCliente()"
        class="w-full bg-primary text-white py-3 rounded-xl font-bold">
        Guardar
    </button>

</div>

<!-- LISTA -->
<main id="cli" class="flex flex-col gap-3 flex-grow"></main>

<!-- FOOTER -->
<footer class="mt-6 text-center text-xs text-slate-400 uppercase">
Kilómetro Cero • 2026
</footer>

<!-- JS -->
<script type="module">

const API = "https://script.google.com/macros/s/AKfycbwglNauq2RBBZqcPkamIBqioTShRzO_Jo9Afjo7r0OWC7AKy6740QEeOywZ26Pssm6u/exec";

let clientes = [];

// =======================
// 📥 CARGAR CLIENTES
// =======================
async function cargarClientes() {
    const res = await fetch(`${API}?pestaña=Clientes`);
    clientes = await res.json();
    renderClientes(clientes);
}

// =======================
// 🎨 RENDER
// =======================
function renderClientes(data) {

    let html = "";

    data.forEach(c => {
        html += `
        <div class="bg-white p-4 card border border-outline shadow-sm">
            <div class="flex justify-between items-center">

                <div>
                    <h3 class="font-bold">${c.Nombre || "-"}</h3>
                    <p class="text-xs text-slate-500">${c.Dirección || ""}</p>
                    <p class="text-xs text-primary">${c.Zona || ""}</p>
                </div>

                <div class="text-right">
                    <p class="text-sm font-bold">${c.Teléfono || "-"}</p>
                    <p class="text-xs text-slate-400">${c.Estado || ""}</p>
                </div>

            </div>
        </div>
        `;
    });

    document.getElementById("cli").innerHTML = html;
}

// =======================
// 🔍 FILTRO
// =======================
function filtrarClientes() {
    const txt = document.getElementById("buscar").value.toLowerCase();

    const filtrados = clientes.filter(c =>
        (c.Nombre || "").toLowerCase().includes(txt) ||
        (c.Dirección || "").toLowerCase().includes(txt)
    );

    renderClientes(filtrados);
}

// =======================
// ➕ MOSTRAR FORM
// =======================
function toggleForm() {
    document.getElementById("formCliente").classList.toggle("hidden");
}

// =======================
// 💾 GUARDAR CLIENTE
// =======================
async function guardarCliente() {

    const data = {
        pestaña: "Clientes",
        Nombre: document.getElementById("nombre").value,
        Teléfono: document.getElementById("telefono").value,
        Dirección: document.getElementById("direccion").value,
        Zona: document.getElementById("zona").value
    };

    await fetch(API, {
        method: "POST",
        body: JSON.stringify(data)
    });

    alert("Cliente guardado");

    toggleForm();
    cargarClientes();
}

// INIT
cargarClientes();

</script>

</body>
</html>
