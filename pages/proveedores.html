<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos</title>

<link rel="stylesheet" href="../styles/global.css">

</head>
<body>

<header class="header">
  <h2>📦 Pedidos</h2>
</header>

<div style="padding:15px">

<button onclick="crearPedido()" class="btn-primary">
  + Nuevo Pedido
</button>

<div id="lista"></div>

</div>

<script type="module">
import { API } from "../config.js";

async function cargarPedidos() {
  const res = await fetch(`${API}?pestaña=Pedidos`);
  const data = await res.json();

  let html = "";

  data.forEach(p => {
    html += `
      <div class="card">
        <b>${p.Cliente}</b><br>
        ${p.Dirección}<br>
        Zona: ${p.Zona}<br>
        Estado: <b>${p.Estado}</b><br><br>

        <button onclick="entregar('${p.ID}')" class="btn-success">
          Entregar
        </button>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

window.entregar = async (id) => {
  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      pestaña: "Pedidos",
      accion: "entregar",
      ID: id,
      Usuario: "Darwin"
    })
  });

  cargarPedidos();
};

cargarPedidos();
</script>

</body>
</html>
