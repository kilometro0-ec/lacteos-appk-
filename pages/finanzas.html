<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Finanzas - Lógica Láctea</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                primary: "#a21caf",
                background: "#faf5ff",
                outline: "#e9d5ff",
                success: "#16a34a",
                danger: "#ef4444"
            }
        }
    }
}
</script>

<style>
body { font-family: 'Work Sans', sans-serif; }

.card {
    border-radius: 1.5rem;
}
</style>

</head>

<body class="bg-background text-slate-900 min-h-screen flex flex-col px-5 py-6">

<!-- HEADER -->
<header class="mb-6 flex items-center justify-between">
    
    <button onclick="history.back()"
        class="w-10 h-10 bg-white border border-outline rounded-xl flex items-center justify-center">
        <span class="material-symbols-outlined">arrow_back</span>
    </button>

    <h1 class="text-lg font-black uppercase">Finanzas</h1>

    <button onclick="cargarFin()"
        class="w-10 h-10 bg-primary text-white rounded-xl flex items-center justify-center">
        <span class="material-symbols-outlined">refresh</span>
    </button>
</header>

<!-- RESUMEN -->
<div class="grid grid-cols-2 gap-4 mb-4">

    <div class="bg-white p-4 card border border-outline text-center shadow-sm">
        <p class="text-xs uppercase text-slate-400">Pendiente</p>
        <h2 id="totalPendiente" class="text-xl font-black text-danger">$0.00</h2>
    </div>

    <div class="bg-white p-4 card border border-outline text-center shadow-sm">
        <p class="text-xs uppercase text-slate-400">Cobrado</p>
        <h2 id="totalCobrado" class="text-xl font-black text-success">$0.00</h2>
    </div>

</div>

<!-- LISTA -->
<main id="fin" class="flex flex-col gap-3 flex-grow"></main>

<!-- FOOTER -->
<footer class="mt-6 text-center text-xs text-slate-400 uppercase">
Kilómetro Cero • 2026
</footer>

<!-- JS -->
<script type="module">

const API = "https://script.google.com/macros/s/AKfycbwglNauq2RBBZqcPkamIBqioTShRzO_Jo9Afjo7r0OWC7AKy6740QEeOywZ26Pssm6u/exec";

// =======================
// 💰 CARGAR FINANZAS
// =======================
async function cargarFin() {

    const res = await fetch(`${API}?pestaña=Pedidos`);
    const data = await res.json();

    let pendiente = 0;
    let cobrado = 0;

    let html = "";

    data.forEach(p => {

        const total = parseFloat(p.Total) || 0;

        if (p.Estado === "PENDIENTE") pendiente += total;
        if (p.Estado === "ENTREGADO") cobrado += total;

        html += `
        <div class="bg-white p-4 card border border-outline shadow-sm flex justify-between items-center">
            
            <div>
                <h3 class="font-bold">${p.Cliente || "-"}</h3>
                <p class="text-xs text-slate-500">${p.Dirección || ""}</p>
            </div>

            <div class="text-right">
                <p class="font-bold">$${total.toFixed(2)}</p>
                <p class="text-xs ${p.Estado === "PENDIENTE" ? "text-red-500" : "text-green-600"}">
                    ${p.Estado}
                </p>
            </div>

        </div>
        `;
    });

    document.getElementById("fin").innerHTML = html;

    document.getElementById("totalPendiente").innerText = "$" + pendiente.toFixed(2);
    document.getElementById("totalCobrado").innerText = "$" + cobrado.toFixed(2);
}

// INIT
cargarFin();

</script>

</body>
</html>
